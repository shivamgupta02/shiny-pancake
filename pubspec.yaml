name: expense_calculator
description: A Flutter expense calculator app with SMS auto-detection, local storage, and reporting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Local Database
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Charts
  fl_chart: ^0.66.0

  # Authentication
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.7
  crypto: ^3.0.3

  # Export
  excel: ^4.0.3
  pdf: ^3.10.7
  printing: ^5.11.1

  # SMS (will use platform channels - native implementation in Unit 6)
  flutter_local_notifications: ^17.0.0

  # Sharing & Files
  share_plus: ^7.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
